app = "kite-agent-hub"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "5s"

[build]

[deploy]
  release_command = "/app/bin/migrate"

[env]
  PHX_HOST = "kiteagenthub.com"
  PORT = "8080"
  ECTO_IPV6 = "true"
  PHX_SERVER = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

  [http_service.http_options]
    # Phoenix LiveView WebSocket upgrades need the Connection: Upgrade
    # hop-by-hop header to reach the app. Fly's proxy uses HTTP/2 on the
    # backend hop by default, which strips Connection. Forcing HTTP/1.1
    # between Fly's proxy and the app preserves the header so LV's
    # websocket transport connects instead of falling back to longpoll.
    h2_backend = false

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
